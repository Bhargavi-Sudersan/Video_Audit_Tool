stages:
  - test
  - build

backend-tests:
  stage: test
  image: python:3.12-slim
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends libglib2.0-0 ffmpeg
    - cd backend
    - pip install --no-cache-dir -r requirements.txt pytest
  script:
    - python -m pytest tests -q
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

frontend-build:
  stage: build
  image: node:20-alpine
  before_script:
    - cd frontend
    - npm install
  script:
    - npm run build
  artifacts:
    paths:
      - frontend/dist
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

